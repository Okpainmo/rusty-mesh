      SERVICE_NAME: order-service
      SERVICE_BIND_HOST: 0.0.0.0
      SERVICE_ADVERTISE_HOST: order-service-2
      MESH_URL: http://rusty-mesh:3080
    depends_on:
      - rusty-mesh

  cart-service-1:
